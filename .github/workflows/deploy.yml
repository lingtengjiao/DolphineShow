name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package code
        run: |
          tar czf deploy.tar.gz \
            --exclude='./deploy.tar.gz' \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./frontend/dist' \
            --exclude='./backend/uploads' \
            --exclude='./__pycache__' \
            --exclude='./.venv' \
            .
          ls -lh deploy.tar.gz

      - name: Upload tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # 解压最新代码（覆盖现有文件，但保留 uploads/db 等数据）
            tar xzf /tmp/deploy.tar.gz -C ${{ secrets.DEPLOY_PATH }}
            rm -f /tmp/deploy.tar.gz

            # 写入生产环境变量
            printf '%s\n' \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "ALGORITHM=HS256" \
              "ACCESS_TOKEN_EXPIRE_MINUTES=1440" \
              "UPLOAD_DIR=/app/uploads" \
              "TOS_ACCESS_KEY=${{ secrets.TOS_ACCESS_KEY }}" \
              "TOS_SECRET_KEY=${{ secrets.TOS_SECRET_KEY }}" \
              "TOS_BUCKET=dpshow" \
              "TOS_REGION=cn-shanghai" \
              "TOS_ENDPOINT=tos-cn-shanghai.volces.com" \
              > backend/.env

            # 构建并启动服务
            docker compose up --build -d

            # 清理旧镜像
            docker image prune -f

            echo "✅ Deployment completed!"
