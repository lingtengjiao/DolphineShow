name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 20m
          script: |
            set -e

            # 配置 git 安全目录
            git config --global --add safe.directory ${{ secrets.DEPLOY_PATH }}

            cd ${{ secrets.DEPLOY_PATH }}

            # 拉取最新代码（使用 token 认证）
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/lingtengjiao/DolphineShow.git
            git fetch origin main
            git reset --hard origin/main

            # 写入生产环境变量
            printf '%s\n' \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "ALGORITHM=HS256" \
              "ACCESS_TOKEN_EXPIRE_MINUTES=1440" \
              "UPLOAD_DIR=/app/uploads" \
              "TOS_ACCESS_KEY=${{ secrets.TOS_ACCESS_KEY }}" \
              "TOS_SECRET_KEY=${{ secrets.TOS_SECRET_KEY }}" \
              "TOS_BUCKET=dpshow" \
              "TOS_REGION=cn-shanghai" \
              "TOS_ENDPOINT=tos-cn-shanghai.volces.com" \
              > backend/.env

            # 构建并启动服务
            docker compose up --build -d

            # 清理旧镜像
            docker image prune -f

            echo "✅ Deployment completed!"
